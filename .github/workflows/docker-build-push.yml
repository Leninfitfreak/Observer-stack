name: Docker Build and Push

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/ai-observer-agent
  DOCKERHUB_IMAGE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/ai-observer-agent
  INFRA_REPO: Leninfitfreak/leninkart-infra
  INFRA_BRANCH: dev
  INFRA_DEPLOYMENT_FILE: platform/ai-observer/base/deployment.yaml

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=dev
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          ref: ${{ env.INFRA_BRANCH }}
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra-repo

      - name: Update infra image tag
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TARGET_IMAGE="docker.io/${{ vars.DOCKERHUB_USERNAME }}/ai-observer-agent:sha-${SHORT_SHA}"
          FILE="infra-repo/${{ env.INFRA_DEPLOYMENT_FILE }}"
          sed -i "s|image: .*|image: ${TARGET_IMAGE}|g" "${FILE}"
          echo "Updated ${FILE} to ${TARGET_IMAGE}"

      - name: Commit and push infra update
        shell: bash
        run: |
          cd infra-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ env.INFRA_DEPLOYMENT_FILE }}"
          if git diff --cached --quiet; then
            echo "No infra manifest changes to commit."
            exit 0
          fi
          git commit -m "chore(ai-observer): bump image to ${GITHUB_SHA::7}"
          git push origin "${{ env.INFRA_BRANCH }}"
