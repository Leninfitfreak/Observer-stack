version: "3"
x-common: &common
  networks:
    - signoz-net
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"
x-clickhouse-defaults: &clickhouse-defaults
  !!merge <<: *common
  image: clickhouse/clickhouse-server:25.5.6
  tty: true
  labels:
    signoz.io/scrape: "true"
    signoz.io/port: "9363"
    signoz.io/path: "/metrics"
  depends_on:
    init-clickhouse:
      condition: service_completed_successfully
    zookeeper-1:
      condition: service_healthy
  healthcheck:
    test:
      - CMD
      - wget
      - --spider
      - -q
      - 0.0.0.0:8123/ping
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144
  environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1
x-zookeeper-defaults: &zookeeper-defaults
  !!merge <<: *common
  image: signoz/zookeeper:3.7.1
  user: root
  labels:
    signoz.io/scrape: "true"
    signoz.io/port: "9141"
    signoz.io/path: "/metrics"
  healthcheck:
    test:
      - CMD-SHELL
      - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
    interval: 30s
    timeout: 5s
    retries: 3
x-db-depend: &db-depend
  !!merge <<: *common
  depends_on:
    clickhouse:
      condition: service_healthy
services:
  init-clickhouse:
    !!merge <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-init-clickhouse
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
  zookeeper-1:
    !!merge <<: *zookeeper-defaults
    container_name: signoz-zookeeper-1
    # ports:
    #   - "2181:2181"
    #   - "2888:2888"
    #   - "3888:3888"
    volumes:
      - zookeeper-1:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
  clickhouse:
    !!merge <<: *clickhouse-defaults
    container_name: signoz-clickhouse
    # ports:
    #   - "9000:9000"
    #   - "8123:8123"
    #   - "9181:9181"
    volumes:
      - ../common/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ../common/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ../common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - ../common/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse:/var/lib/clickhouse/
      # - ../common/clickhouse/storage.xml:/etc/clickhouse-server/config.d/storage.xml
  signoz:
    !!merge <<: *db-depend
    image: signoz/signoz:${VERSION:-v0.113.0}
    container_name: signoz
    ports:
      - "8080:8080" # signoz port
    volumes:
      - sqlite:/var/lib/signoz/
      - ../../frontend/build:/etc/signoz/web:ro
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=secret
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - localhost:8080/api/v1/health
      interval: 30s
      timeout: 5s
      retries: 3
  otel-collector:
    !!merge <<: *db-depend
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.144.1}
    container_name: signoz-otel-collector
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ../common/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      # - "1777:1777"     # pprof extension
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
  signoz-telemetrystore-migrator:
    !!merge <<: *db-depend
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.144.1}
    container_name: signoz-telemetrystore-migrator
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    restart: on-failure
  deep-observer-postgres:
    !!merge <<: *common
    image: postgres:16-alpine
    container_name: deep-observer-postgres
    environment:
      POSTGRES_DB: ${DEEP_OBSERVER_POSTGRES_DB:-deep_observer}
      POSTGRES_USER: ${DEEP_OBSERVER_POSTGRES_USER:-deep_observer}
      POSTGRES_PASSWORD: ${DEEP_OBSERVER_POSTGRES_PASSWORD:-deep_observer}
    volumes:
      - deep-observer-postgres:/var/lib/postgresql/data
      - ../../deep-observer/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DEEP_OBSERVER_POSTGRES_USER:-deep_observer} -d ${DEEP_OBSERVER_POSTGRES_DB:-deep_observer}
      interval: 10s
      timeout: 5s
      retries: 10
  deep-observer-ai-brain:
    !!merge <<: *common
    build:
      context: ../../deep-observer
      dockerfile: docker/ai-brain/Dockerfile
    container_name: deep-observer-ai-brain
    env_file:
      - ../../deep-observer/.env
    environment:
      POSTGRES_HOST: deep-observer-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${DEEP_OBSERVER_POSTGRES_DB:-deep_observer}
      POSTGRES_USER: ${DEEP_OBSERVER_POSTGRES_USER:-deep_observer}
      POSTGRES_PASSWORD: ${DEEP_OBSERVER_POSTGRES_PASSWORD:-deep_observer}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_HTTP_PORT: 8123
      CLICKHOUSE_DATABASE: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama_cloud}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://api.ollama.com}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-local-demo-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-3}
    depends_on:
      deep-observer-postgres:
        condition: service_healthy
  deep-observer-ai-core:
    !!merge <<: *common
    build:
      context: ../../deep-observer
      dockerfile: docker/ai-core/Dockerfile
    container_name: deep-observer-ai-core
    env_file:
      - ../../deep-observer/.env
    environment:
      AI_CORE_PORT: 8081
      AI_BRAIN_URL: http://deep-observer-ai-brain:8090
      POSTGRES_HOST: deep-observer-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${DEEP_OBSERVER_POSTGRES_DB:-deep_observer}
      POSTGRES_USER: ${DEEP_OBSERVER_POSTGRES_USER:-deep_observer}
      POSTGRES_PASSWORD: ${DEEP_OBSERVER_POSTGRES_PASSWORD:-deep_observer}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_DATABASE: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      KUBECONFIG: /root/.kube/config
    ports:
      - "8081:8081"
    depends_on:
      deep-observer-postgres:
        condition: service_healthy
      deep-observer-ai-brain:
        condition: service_started
    volumes:
      - ${USERPROFILE}/.kube:/root/.kube:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
  deep-observer-frontend:
    !!merge <<: *common
    build:
      context: ../../deep-observer
      dockerfile: docker/frontend/Dockerfile
    container_name: deep-observer-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8081
    ports:
      - "3000:80"
    depends_on:
      deep-observer-ai-core:
        condition: service_started
networks:
  signoz-net:
    name: signoz-net
volumes:
  clickhouse:
    name: signoz-clickhouse
  deep-observer-postgres:
    name: deep-observer-postgres
  sqlite:
    name: signoz-sqlite
  zookeeper-1:
    name: signoz-zookeeper-1
