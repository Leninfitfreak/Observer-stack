{
  "alerts": [
    {
      "name": "leninkart-product-service-high-latency",
      "alert_type": "TRACES_BASED_ALERT",
      "signal": "traces",
      "aggregation_expression": "p90(duration_nano)",
      "filter_expression": "serviceName = 'product-service' AND spanKind = 'Server'",
      "threshold_var": "LATENCY_THRESHOLD",
      "target_unit": "ms",
      "unit": "ns",
      "channels": ["email_primary", "slack_primary"],
      "severity": "critical"
    },
    {
      "name": "leninkart-order-service-high-latency",
      "alert_type": "TRACES_BASED_ALERT",
      "signal": "traces",
      "aggregation_expression": "p90(duration_nano)",
      "filter_expression": "serviceName = 'order-service' AND spanKind = 'Server'",
      "threshold_var": "LATENCY_THRESHOLD",
      "target_unit": "ms",
      "unit": "ns",
      "channels": ["email_primary", "slack_primary"],
      "severity": "critical"
    },
    {
      "name": "leninkart-product-service-high-error-rate",
      "alert_type": "TRACES_BASED_ALERT",
      "signal": "traces",
      "aggregation_expression": "count()",
      "filter_expression": "serviceName = 'product-service' AND status.code = 'STATUS_CODE_ERROR'",
      "threshold_var": "ERROR_RATE_THRESHOLD",
      "channels": ["email_primary", "slack_primary"],
      "severity": "critical"
    },
    {
      "name": "leninkart-order-service-high-error-rate",
      "alert_type": "TRACES_BASED_ALERT",
      "signal": "traces",
      "aggregation_expression": "count()",
      "filter_expression": "serviceName = 'order-service' AND status.code = 'STATUS_CODE_ERROR'",
      "threshold_var": "ERROR_RATE_THRESHOLD",
      "channels": ["email_primary", "slack_primary"],
      "severity": "critical"
    },
    {
      "name": "leninkart-product-service-high-cpu",
      "alert_type": "METRIC_BASED_ALERT",
      "signal": "metrics",
      "metric_name": "jvm.cpu.recent_utilization",
      "time_aggregation": "avg",
      "space_aggregation": "avg",
      "filter_expression": "service.name = 'product-service' AND deployment.environment = 'dev'",
      "threshold_var": "CPU_THRESHOLD",
      "target_unit": "%",
      "channels": ["email_primary", "slack_primary"],
      "severity": "warning"
    },
    {
      "name": "leninkart-order-service-high-cpu",
      "alert_type": "METRIC_BASED_ALERT",
      "signal": "metrics",
      "metric_name": "jvm.cpu.recent_utilization",
      "time_aggregation": "avg",
      "space_aggregation": "avg",
      "filter_expression": "service.name = 'order-service' AND deployment.environment = 'dev'",
      "threshold_var": "CPU_THRESHOLD",
      "target_unit": "%",
      "channels": ["email_primary", "slack_primary"],
      "severity": "warning"
    },
    {
      "name": "leninkart-product-service-high-memory",
      "alert_type": "METRIC_BASED_ALERT",
      "signal": "metrics",
      "metric_name": "jvm.memory.used",
      "time_aggregation": "avg",
      "space_aggregation": "sum",
      "filter_expression": "service.name = 'product-service' AND deployment.environment = 'dev'",
      "threshold_var": "MEMORY_THRESHOLD",
      "target_unit": "By",
      "channels": ["email_primary", "slack_primary"],
      "severity": "warning"
    },
    {
      "name": "leninkart-order-service-high-memory",
      "alert_type": "METRIC_BASED_ALERT",
      "signal": "metrics",
      "metric_name": "jvm.memory.used",
      "time_aggregation": "avg",
      "space_aggregation": "sum",
      "filter_expression": "service.name = 'order-service' AND deployment.environment = 'dev'",
      "threshold_var": "MEMORY_THRESHOLD",
      "target_unit": "By",
      "channels": ["email_primary", "slack_primary"],
      "severity": "warning"
    },
    {
      "name": "leninkart-kafka-consumer-lag",
      "alert_type": "METRIC_BASED_ALERT",
      "signal": "metrics",
      "metric_name": "kafka.consumer_group.lag",
      "time_aggregation": "avg",
      "space_aggregation": "avg",
      "filter_expression": "topic = 'product-orders'",
      "threshold_var": "KAFKA_LAG_THRESHOLD",
      "channels": ["email_primary", "slack_primary"],
      "severity": "critical"
    },
    {
      "name": "leninkart-product-service-no-traffic",
      "alert_type": "METRIC_BASED_ALERT",
      "signal": "metrics",
      "metric_name": "signoz.calls.total",
      "time_aggregation": "rate",
      "space_aggregation": "sum",
      "filter_expression": "service.name = 'product-service' AND deployment.environment = 'dev'",
      "threshold_var": "NO_TRAFFIC_THRESHOLD",
      "channels": ["email_primary", "slack_primary"],
      "alert_on_absent": true,
      "absent_for": 10,
      "severity": "critical",
      "summary": "No traffic or telemetry detected for product-service"
    },
    {
      "name": "leninkart-order-service-no-traffic",
      "alert_type": "METRIC_BASED_ALERT",
      "signal": "metrics",
      "metric_name": "signoz.calls.total",
      "time_aggregation": "rate",
      "space_aggregation": "sum",
      "filter_expression": "service.name = 'order-service' AND deployment.environment = 'dev'",
      "threshold_var": "NO_TRAFFIC_THRESHOLD",
      "channels": ["email_primary", "slack_primary"],
      "alert_on_absent": true,
      "absent_for": 10,
      "severity": "critical",
      "summary": "No traffic or telemetry detected for order-service"
    },
    {
      "name": "leninkart-log-error-spike",
      "alert_type": "LOGS_BASED_ALERT",
      "signal": "logs",
      "aggregation_expression": "count()",
      "filter_expression": "service.name IN ('product-service','order-service') AND severity_text IN ('ERROR','FATAL')",
      "threshold_var": "ERROR_RATE_THRESHOLD",
      "channels": ["email_primary", "slack_primary"],
      "requires_var": "ENABLE_LOG_ALERTS",
      "severity": "warning"
    },
    {
      "name": "leninkart-otel-export-failures",
      "alert_type": "METRIC_BASED_ALERT",
      "signal": "metrics",
      "metric_name": "otelcol.exporter.send_failed_spans",
      "time_aggregation": "sum",
      "space_aggregation": "sum",
      "filter_expression": "service.name = 'otel-collector'",
      "threshold": 1,
      "channels": ["email_primary", "slack_primary"],
      "severity": "critical"
    }
  ]
}
