services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-reasoning-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ai-brain:
    build: ./ai_observer_brain
    container_name: ai-brain
    env_file:
      - .env
    working_dir: /app
    ports:
      - "18082:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-core:
    build: ./ai_observer_core
    container_name: ai-core
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      AI_BRAIN_URL: http://ai-brain:8000
    depends_on:
      postgres:
        condition: service_healthy
      ai-brain:
        condition: service_healthy
    ports:
      - "18081:8081"
    restart: unless-stopped
    networks:
      - default
      - signoz-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${API_BASE_URL}
    container_name: ai-reasoning-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      ai-core:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  signoz-net:
    external: true
